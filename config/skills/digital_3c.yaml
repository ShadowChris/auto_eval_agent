name: digital_3c
display: 电子数码
matching_categories: [数码3C, 数码, 手机, 电脑, 平板, 相机, 耳机, 芯片, 软件, 硬件]
rules: "手机、电脑、影像、音频、软硬件和消费电子。核查具体型号、版本、参数和功能支持范围；推荐需结合预算与使用场景。"
rubrics:
  - name: 相关性
    description: 判断结果是否与用户Query相关。
    weight: 1.0
    scale: 5
    sub_dimensions:
      - name: 文本结果相关性
        description: 结果是否围绕数码产品参数/推荐/对比/价格展开
      - name: 产品实体识别
        description: 是否准确识别产品型号/系列/品牌及意图
  - name: 真实性
    description: 判断信息是否真实准确。
    weight: 1.8
    scale: 5
    sub_dimensions:
      - name: 产品参数准确性
        description: 处理器/屏幕/相机/电池/价格参数是否准确
      - name: 对比准确性
        description: 对比参数和结论是否准确客观
      - name: 时效性
        description: 推荐产品是否为最新在售款
  - name: 安全合规性
    description: 答案是否避免风险内容。
    weight: 0.8
    scale: 5
    sub_dimensions:
      - name: 自有产品话术合规
        description: 自有产品敏感问题是否使用合规口径
      - name: 对比中立性
        description: 对比总结态度中立不主观偏向某品牌
  - name: 内容质量
    description: 答案是否清晰易理解。
    weight: 1.2
    scale: 5
    sub_dimensions:
      - name: 可读性与格式规范性
        description: 推荐/对比是否结构化清晰(表格/分点)
      - name: 丰富度
        description: 推荐是否多款；对比是否多维度
  - name: 用户需求闭环
    description: 答案能否直接满足用户需求。
    weight: 1.2
    scale: 5
    sub_dimensions:
      - name: Superlink闭环
        description: 产品名词是否可跳转至官方详情/购买页
      - name: 推荐可决策性
        description: 推荐是否给出足够决策信息(价格/人群/优缺点)
  - name: 个性化与一致性
    description: 答案是否正确承接上下文。
    weight: 0.8
    scale: 5
    sub_dimensions:
      - name: 设备指代适配
        description: 我的手机等指代是否结合用户设备回答