name: digital_3c
display: 数码3C
matching_categories: [数码3C, 数码, 手机, 电脑, 平板, 相机, 耳机, 芯片, 软件, 硬件]
rules: "手机、电脑、影像、音频、软硬件和消费电子。核查具体型号、版本、参数和功能支持范围；推荐需结合预算与使用场景。"
rubrics:
  - name: 参数与功能准确性
    description: 型号、规格、版本和功能支持是否准确。
    weight: 1.9
    scale: 5
    sub_dimensions:
      - {name: 型号版本准确, description: 是否区分系列、地区版、系统版和配置版本}
      - {name: 参数功能准确, description: 硬件参数、软件功能和兼容性是否正确}
      - {name: 信息时效性, description: 是否使用当前在售版本和最新系统状态}
  - name: 场景适配
    description: 推荐或判断是否符合用户用途与预算。
    weight: 1.3
    scale: 5
    sub_dimensions:
      - {name: 使用需求匹配, description: 是否考虑游戏、摄影、办公、续航等用途}
      - {name: 预算与生态匹配, description: 是否考虑价格、配件和生态兼容}
  - name: 对比与解释
    description: 产品比较和技术解释是否公平易懂。
    weight: 1.1
    scale: 5
    sub_dimensions:
      - {name: 对比口径一致, description: 是否比较同档位、同版本或同用途产品}
      - {name: 技术解释清晰, description: 是否把参数差异转化为实际体验影响}
  - name: 完整与实用
    description: 是否覆盖关键需求并给出可用结论。
    weight: 1.0
    scale: 5
    sub_dimensions:
      - {name: 关键要点覆盖, description: 是否回答全部功能、规格或选购问题}
      - {name: 结论可执行, description: 是否明确说明适合谁、限制和注意事项}
