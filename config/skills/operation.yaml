name: operation
display: 操作类
matching_categories: []
rules: "操作类评测：看录屏关键帧判断操作是否完成意图。务必区分「真的执行」与「只给口头指导/教程而未执行」。"
rubrics:
  - name: 操作完成度
    description: 基于整个 query 判断用户目标是否完整闭环。
    weight: 0.7
    scale: 5
    criteria:
      - 最终状态是否满足整个 query
      - 是否仍需要用户继续操作
      - 简单任务是否已经到达只差一个且无需补充信息的最终动作
      - 复杂多任务中的所有要求是否完成
      - agent 自述是否与画面一致
      - 初始状态是否已经满足用户要求
      - 状态切换任务是否有独立于 agent 文字声明的最终状态证据
      - 查询或服务结果是否满足 query 中的实体、条件和关键事实
      - 是否因权限、账号、目标选择、用户确认、其他信息、硬件或设备能力不足而无法完成
    score_anchors:
      5: 整个 query 完整闭环，或初始状态已经满足；最终状态有独立画面或可核验结果支持；有 agent 自述时与证据一致
      4: 结果基本完成，但最终证据或回复存在轻微不足
      3: 简单任务已到达直接执行最终动作的目标界面且只差一步，或复杂多任务已有独立证据证明只完成部分结果
      2: 只完成少量中间过程，最终目标明显未闭环
      1: 未执行、最终状态错误、执行相反操作，或只有文字声明而没有任何实际完成证据
  - name: 步骤正确性
    description: 基于整个操作过程判断实际操作路径是否正确、连贯且合理。
    weight: 0.3
    scale: 5
    criteria:
      - 是否发生与 query 相关的实际操作
      - 操作路径是否正确
      - 是否缺失关键步骤
      - 是否出现走错、卡住或反复尝试
      - 是否存在可观察到的冗余或无关步骤
      - 合法替代路径、系统自动跳转和关键帧之间缺失的过渡画面不应被判为冗余
      - 只评价当前 query 发出后到任务闭环前的操作，忽略之前的历史内容和完成后的无关行为
      - 录屏工具自身的计时、红色状态标识、悬浮控件等不是 agent 操作，不得判为走错或冗余
      - agent 文字描述或操作卡片只能证明其计划或过程，不能单独证明步骤已实际执行完成
    score_anchors:
      5: 当前任务有效时间窗内的实际路径正确、连贯，没有可观察到的冗余、无关或错误步骤
      4: 存在少量冗余、重复点击或无关步骤，但不影响最终结果，可以接受
      3: 存在明显绕路或多次重试，但整体方向正确
      2: 多次走错路径或操作混乱，只完成少量相关过程
      1: 路径完全错误、南辕北辙，或没有发生与 query 相关的实际操作
