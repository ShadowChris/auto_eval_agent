name: music
display: 音乐
matching_categories: [音乐, 歌曲, 歌手, 专辑, 乐队, 演唱会, 乐理]
rules: "歌曲、歌手、专辑、乐理、音乐史、演出和音乐推荐；事实需核查，鉴赏与推荐允许审美多样性。"
rubrics:
  - name: 专业准确性
    description: 音乐事实、术语和作品信息是否准确。
    weight: 1.6
    scale: 5
    sub_dimensions:
      - {name: 作品信息准确, description: 歌名、艺人、专辑、发行时间等是否正确}
      - {name: 乐理术语准确, description: 曲式、调性、节奏、和声等术语是否正确}
  - name: 音乐理解
    description: 对作品风格、情绪和创作特点的理解是否深入。
    weight: 1.3
    scale: 5
    sub_dimensions:
      - {name: 风格分析, description: 对流派、编曲、演唱和声音特征的分析是否恰当}
      - {name: 语境理解, description: 是否结合创作背景和听众语境}
  - name: 推荐匹配度
    description: 推荐内容是否符合用户偏好与场景。
    weight: 1.0
    scale: 5
    sub_dimensions:
      - {name: 偏好匹配, description: 是否贴合曲风、年代、语言或艺人偏好}
      - {name: 多样性, description: 是否提供合理且不过度同质化的选择}
  - name: 完整与表达
    description: 回答是否完整、清楚并具有可读性。
    weight: 0.8
    scale: 5
    sub_dimensions:
      - {name: 需求覆盖, description: 是否回应全部问题}
      - {name: 表达清晰, description: 是否简洁、有条理、易理解}
