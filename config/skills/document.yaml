name: document
display: 文档
matching_categories: [文档, PDF, Word, 表格, 报告, 合同, 论文, 摘要, 信息抽取]
rules: "对给定文档、PDF、表格、报告或合同进行摘要、抽取、比较、改写和问答。回答必须忠实于文档，不得补造未出现的信息。"
rubrics:
  - name: 相关性
    description: 判断结果是否与用户Query相关。
    weight: 1.0
    scale: 5
    sub_dimensions:
      - name: 原文相关性
        description: 摘要/解析是否忠实于原文不添加原文没有的内容
      - name: 指令遵从性
        description: 是否遵从用户对格式/字数/结构/内容的指令
      - name: 语种保持
        description: 同一语种中问中答英问英答
  - name: 真实性
    description: 判断信息是否真实准确。
    weight: 2.0
    scale: 5
    sub_dimensions:
      - name: 事实性准确性
        description: 摘要/解析正确反映原文事实无张冠李戴
      - name: 原文引用准确性
        description: 引用原文给出引用标签且可定位
  - name: 安全合规性
    description: 答案是否避免风险内容。
    weight: 0.8
    scale: 5
    sub_dimensions:
      - name: 版权合规
        description: 不输出大段原文不侵犯版权
  - name: 内容质量
    description: 答案是否清晰易理解。
    weight: 1.0
    scale: 5
    sub_dimensions:
      - name: 结构化
        description: 是否采用总-分-总结构分段分点加粗
      - name: 信息密度
        description: 摘要长度与原文比例合理
      - name: 图表图文并茂
        description: 是否恰当使用表格/图表辅助信息呈现
      - name: 深入性
        description: 是否对核心要点深入剖析提供原理/数据/术语解释
  - name: 用户需求闭环
    description: 答案能否直接满足用户需求。
    weight: 1.2
    scale: 5
    sub_dimensions:
      - name: 文件解析闭环
        description: 是否能成功解析上传的文件并生成结果
      - name: 指令性需求闭环
        description: 指定格式(表格/脑图/PPT)是否按要求完成
  - name: 个性化与一致性
    description: 答案是否正确承接上下文。
    weight: 0.8
    scale: 5
    sub_dimensions:
      - name: 上下文前后一致性
        description: 多轮是否承接上轮文档/摘要/问题