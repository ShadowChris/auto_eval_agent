name: math_solving
display: 数学解题
matching_categories: [数学解题, 数学, 计算, 推理, 证明, 应用题]
rules: "数学计算、证明、逻辑推导和应用题。先独立验算；简单运算自行复核，复杂或精度敏感计算再调用工具。"
rubrics:
  - name: 相关性
    description: 判断文本、参考来源、富媒体、链接、服务卡片等结果是否与用户Query及Answer相关，是否存在答非所问、误召或跑题。
    weight: 1.0
    scale: 5
    sub_dimensions:
      - name: 文本结果相关性
        description: 解题内容是否围绕用户给出的数学题、题问和求解目标展开，避免答非所问或只讲无关知识点
      - name: 解题目标相关性
        description: 是否正确识别用户要的是求答案、讲思路、检查错误、解释某一步、生成同类题或只给提示
  - name: 真实性
    description: 判断答案中的事实、数据、推理、计算、引用与来源是否真实、准确、可信，是否存在过时、虚构或错误。
    weight: 2.0
    scale: 5
    sub_dimensions:
      - name: 解题正确性
        description: 最终答案、选项、结论是否正确，并与题目条件和求解目标一致
      - name: 计算与推导准确性
        description: 每一步变形、计算、代入、化简、证明是否成立，推导链路是否无跳步性错误
      - name: 条件与适用范围检查
        description: 是否检查定义域、取值范围、单位、增根、特殊情况、题目约束等边界条件
      - name: 过程事实性错误
        description: 解题过程中是否存在事实性错误，如公式代入错误、定理使用错误等
  - name: 安全合规性
    description: 判断答案是否避免风险内容、隐私泄露、版权违规、不当承诺和高风险误导。
    weight: 0.8
    scale: 5
    sub_dimensions:
      - name: 学业诚信边界
        description: 对明显考试作弊、代考、绕过监考等请求应拒绝或转为讲解思路
  - name: 内容质量
    description: 判断答案表达、信息识别、结构组织、信息密度和呈现方式是否清晰、完整、易理解。
    weight: 1.2
    scale: 5
    sub_dimensions:
      - name: 题目信息识别完整性
        description: 是否完整识别题干、选项、图形/表格信息、已知条件、求解对象，避免漏读关键信息
      - name: 可读性与符号规范
        description: 解答语言是否清晰，公式、符号、分式、根号和排版是否规范，不出现乱码截断
      - name: 步骤清晰度
        description: 是否按条件提取到关键思路到推导过程到答案顺序展开，关键步骤不过度跳跃
      - name: 展示规范性
        description: 公式展示是否完整、小数位是否合理、是否有乱码/截断/展示不全等问题
  - name: 用户需求闭环
    description: 判断答案能否直接满足用户需求，并通过文字、富媒体、服务卡片、工具或操作步骤完成任务。
    weight: 1.0
    scale: 5
    sub_dimensions:
      - name: 核心问题闭环
        description: 是否给出用户所问的最终答案、选项或结论，并与过程保持一致
      - name: 错因与学习闭环
        description: 当用户给出错误答案或要求讲解时，是否指出错因、正确思路和同类题注意点
  - name: 个性化与一致性
    description: 判断答案是否正确承接上下文，并适配用户偏好、位置、设备、能力水平或历史需求。
    weight: 0.8
    scale: 5
    sub_dimensions:
      - name: 上下文前后一致性
        description: 多轮追问时是否承接上一轮题目、用户答案、图形信息和已讨论的解法
      - name: 学段与能力适配
        description: 解释深度、公式选择和术语使用是否匹配小学/初中/高中/大学等学段和用户理解水平