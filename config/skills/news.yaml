name: news
display: 新闻
matching_categories: [新闻, 时事, 热点, 政治, 财经新闻, 社会新闻, 国际新闻]
rules: "公共事件、时政、财经和社会热点。必须核查发生时间、信源和最新进展；产品参数等垂直信息优先归入对应垂域。"
rubrics:
  - name: 相关性
    description: 判断结果是否与用户Query相关。
    weight: 1.0
    scale: 5
    sub_dimensions:
      - name: 文本结果相关性
        description: 结果是否围绕新闻事件/人物/地点/话题
      - name: 新闻事件识别
        description: 是否正确识别事件Who/What/When/Where核心要素
  - name: 真实性
    description: 判断事实、数据、引用是否真实可信。
    weight: 2.0
    scale: 5
    sub_dimensions:
      - name: 内容可靠性
        description: 报道来源是否来自权威站点并明确提供媒体名
      - name: 立场中立性
        description: 事件描述是否客观中立不偏袒一方
      - name: 公正多样性
        description: 是否涵盖事件各方观点避免单方面信息
  - name: 安全合规性
    description: 答案是否避免风险内容。
    weight: 0.8
    scale: 5
    sub_dimensions:
      - name: 内容审核
        description: 敏感新闻事件描述是否符合安全合规要求
  - name: 内容质量
    description: 答案是否清晰完整。
    weight: 1.0
    scale: 5
    sub_dimensions:
      - name: 内容深度
        description: 是否涵盖背景原因/进展/影响/发展趋势
      - name: 时效性
        description: 新闻结果是否最新，是否持续更新进展
  - name: 用户需求闭环
    description: 答案能否直接满足用户需求。
    weight: 1.2
    scale: 5
    sub_dimensions:
      - name: 新闻卡需求满足度
        description: 新闻卡是否展示1-5条结果，标题可点击跳转
      - name: 订阅与播报闭环
        description: 订阅是否可点击/修改/关闭；播报是否可语音
  - name: 个性化与一致性
    description: 答案是否正确承接上下文。
    weight: 0.8
    scale: 5
    sub_dimensions:
      - name: 上下文前后一致性
        description: 多轮追问事件进展是否承接上轮