name: automotive
display: 汽车
matching_categories: [汽车, 新车, 车型, 购车, 车评, 新能源车, 燃油车, 驾驶]
rules: "车型参数、选购、用车、维修、法规和汽车行业信息。区分官方参数、实测表现和主观体验，购车建议需结合预算与场景。"
rubrics:
  - name: 相关性
    description: 判断结果是否与用户Query相关。
    weight: 1.0
    scale: 5
    sub_dimensions:
      - name: 文本结果相关性
        description: 结果是否围绕汽车品牌/车型/参数/对比/推荐/试驾
      - name: 汽车实体识别
        description: 是否准确识别品牌/车系/车型/规格及意图
  - name: 真实性
    description: 判断信息是否真实准确。
    weight: 1.8
    scale: 5
    sub_dimensions:
      - name: 汽车参数准确性
        description: 续航/轴距/马力/价格参数是否准确
      - name: 时效性
        description: 推荐车型是否在售最新款
  - name: 安全合规性
    description: 答案是否避免风险内容。
    weight: 0.8
    scale: 5
    sub_dimensions:
      - name: 自有车话术合规
        description: 自有车敏感问题是否使用官方口径
      - name: 对比中立性
        description: 对比总结态度中立
  - name: 内容质量
    description: 答案是否清晰易理解。
    weight: 1.2
    scale: 5
    sub_dimensions:
      - name: 可读性与格式规范性
        description: 参数查询是否用表格展示
      - name: 信息丰富度
        description: 推荐是否多款候选；分析是否覆盖卖点/优缺点
  - name: 用户需求闭环
    description: 答案能否直接满足用户需求。
    weight: 1.2
    scale: 5
    sub_dimensions:
      - name: 试驾卡闭环
        description: 强试驾意图是否召回试驾卡
      - name: Superlink闭环
        description: 车型名称是否可跳转至官方配置页
  - name: 个性化与一致性
    description: 答案是否正确承接上下文。
    weight: 0.8
    scale: 5
    sub_dimensions:
      - name: 上下文前后一致性
        description: 多轮追问同一车型是否承接上轮