name: automotive
display: 汽车
matching_categories: [汽车, 新车, 车型, 购车, 车评, 新能源车, 燃油车, 驾驶]
rules: "车型参数、选购、用车、维修、法规和汽车行业信息。区分官方参数、实测表现和主观体验，购车建议需结合预算与场景。"
rubrics:
  - name: 参数与事实准确性
    description: 车型、配置、价格、性能和政策信息是否准确。
    weight: 1.8
    scale: 5
    sub_dimensions:
      - {name: 车型配置准确, description: 版本、动力、尺寸和配置是否对应正确}
      - {name: 价格政策准确, description: 指导价、权益、补贴和法规是否当前有效}
  - name: 场景适配
    description: 判断或推荐是否符合用户用车场景。
    weight: 1.3
    scale: 5
    sub_dimensions:
      - {name: 需求匹配, description: 是否考虑通勤、家庭、长途、越野等场景}
      - {name: 成本匹配, description: 是否考虑购置、能耗、保险和维护成本}
  - name: 对比与分析
    description: 车型比较是否公平、有依据且维度完整。
    weight: 1.2
    scale: 5
    sub_dimensions:
      - {name: 对比口径一致, description: 是否比较同版本、同价格或同场景产品}
      - {name: 优缺点有据, description: 结论是否有参数、实测或可靠事实支撑}
  - name: 安全与实用
    description: 用车建议是否安全、可执行并提示限制。
    weight: 1.0
    scale: 5
    sub_dimensions:
      - {name: 安全合规, description: 驾驶、改装和维修建议是否安全合法}
      - {name: 落地可用, description: 是否给出明确可执行的选择或操作建议}
