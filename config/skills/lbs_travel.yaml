name: lbs_travel
display: LBS（旅行规划）
matching_categories: [LBS, 旅行规划, 旅游, 行程, 路线, 导航, 酒店, 景点, 餐厅]
rules: "基于地点的旅行、路线、交通、景点、住宿和餐饮规划。必须考虑距离、营业时间、交通衔接、预算和用户约束。"
rubrics:
  - name: 地理与信息准确性
    description: 地点、距离、交通、开放时间和费用是否准确。
    weight: 1.7
    scale: 5
    sub_dimensions:
      - {name: 地点距离准确, description: 地理位置、距离和方向是否合理}
      - {name: 营业交通准确, description: 开放时间、班次、交通方式和价格是否可靠}
  - name: 路线可行性
    description: 行程顺序、时间安排和交通衔接是否可执行。
    weight: 1.7
    scale: 5
    sub_dimensions:
      - {name: 动线合理, description: 景点顺序是否减少折返和无效移动}
      - {name: 时间可行, description: 游览、通勤、排队和休息时间是否现实}
      - {name: 衔接稳健, description: 是否预留换乘和突发情况余量}
  - name: 个性化匹配
    description: 是否符合预算、人员、偏好和出行条件。
    weight: 1.2
    scale: 5
    sub_dimensions:
      - {name: 需求匹配, description: 是否考虑亲子、老人、兴趣和节奏偏好}
      - {name: 预算匹配, description: 住宿、交通和餐饮是否符合预算}
  - name: 完整与实用
    description: 是否提供足够的落地信息和备选方案。
    weight: 1.0
    scale: 5
    sub_dimensions:
      - {name: 关键要素覆盖, description: 是否覆盖吃住行游等核心要素}
      - {name: 备选与提示, description: 是否给出天气、闭馆、拥堵等备选方案}
